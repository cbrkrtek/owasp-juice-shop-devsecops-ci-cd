version: '3.8'

services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop-app
    expose:
      - "3000"
    restart: always

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-security-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - juice-shop
    restart: always